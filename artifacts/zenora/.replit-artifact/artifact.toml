kind = "web"
previewPath = "/"
title = "ZENORA - Own Your Childhood"
version = "1.0.0"
id = "artifacts/zenora"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/zenora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zenora", "run", "build" ]
publicDir = "artifacts/zenora/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
